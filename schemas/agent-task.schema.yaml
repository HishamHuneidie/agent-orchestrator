version: "2.0"
classification: internal
type: object
required: [feature_id, task_id, state, assigned_agent, inputs, success_criteria, handoff]
properties:
  feature_id:
    type: string
  task_id:
    type: string
  state:
    type: string
    enum: [pending, running, waiting, failed, cancelled, completed]
  history:
    type: array
    items:
      type: object
  dependencies:
    type: array
    items:
      type: string
  priority:
    type: string
    enum: [low, medium, high, critical]
  risk:
    type: string
    enum: [low, medium, high]
  assigned_agent:
    type: string
  responsible:
    type: string
  inputs:
    type: array
    items:
      type: string
  expected_files:
    type: array
    items:
      type: string
  success_criteria:
    type: array
    items:
      type: string
  validation_commands:
    type: array
    items:
      type: string
  worktree:
    type: string
  metrics:
    type: object
  artifacts:
    type: array
    items:
      type: string
  retries:
    type: integer
  logs:
    type: array
    items:
      type: string
  handoff:
    type: string
